<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mahjong Socket Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      #log {
        height: 250px;
        overflow-y: auto;
        background: #111;
        color: #0f0;
        padding: 10px;
      }
      .section {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Mahjong WebSocket Test Client</h2>

    <div class="section">
      <h4>Mahjong Tiles</h4>
      <h3>My Hand</h3>
      <div id="myHandTiles"></div>

      <h3>Other Players</h3>
      <div id="otherPlayersTiles"></div>
    </div>
    <br />
    <br />

    <label>Sanctum Token:</label><br />
    <input
      type="text"
      id="sanctumTokenInput"
      placeholder="Enter Sanctum token"
      size="60"
    />

    <br /><br />

    <label>Room ID:</label><br />
    <input id="roomIdInput" placeholder="Enter Room ID" />
    <input id="kongKeyInput" placeholder="Enter Kong Key" />
    <input id="pongKeyInput" placeholder="Enter Pong Key" />
    <input id="chowKeyInput" placeholder="Enter Chow Key" />
    <input id="discardTileIdInput" placeholder="Enter Discard Tile ID" />

    <br /><br />

    <button onclick="connectSocket()">Connect</button>
    <button onclick="sendPing()">Send Ping</button>

    <br /><br />

    <button onclick="joinRoom()">Join Room</button>
    <button onclick="leaveRoom()">Leave Room</button>
    <button onclick="sortHand()">Sort Hand</button>
    <button onclick="acceptKong()">Accept Kong</button>
    <button onclick="passKong()">Pass Kong</button>

    <button onclick="acceptInterruptKong()">Accept Interrupt Kong</button>
    <button onclick="acceptInterruptPong()">Accept Interrupt Pong</button>

    <button onclick="discardTile()">Discard Tile</button>

    <br /><br />
    <button onclick="acceptNormalKong()">Accept Normal Kong</button>
    <button onclick="passNormalKong()">Pass Normal Kong</button>

    <button onclick="acceptNormalPong()">Accept Normal Pong</button>
    <button onclick="passNormalPong()">Pass Normal Pong</button>

    <button onclick="acceptNormalChow()">Accept Normal Chow</button>
    <button onclick="passNormalChow()">Pass Normal Chow</button>

    <div class="section">
      <h3 id="statusDisplay">Status: -</h3>
      <h3 id="countdownDisplay">Countdown: -</h3>
      <h3 id="turnDisplay">Turn: -</h3>
    </div>

    <div class="section">
      <h4>Dice</h4>
      <h3 id="diceDisplay">-</h3>
    </div>

    <div class="section">
      <h4>First Player</h4>
      <h3 id="firstPlayerDisplay">-</h3>
    </div>

    <div class="section">
      <h4>Players</h4>
      <pre id="playersDisplay"></pre>
    </div>

    <div class="section">
      <h4>Round Players</h4>
      <pre id="roundPlayersDisplay"></pre>
    </div>

    <div class="section">
      <h4>Guests</h4>
      <pre id="guestsDisplay"></pre>
    </div>

    <h4>Logs</h4>
    <pre id="log"></pre>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script>
      let socket;
      let wsToken = null;
      let sanctumToken = null;
      let user_id = null;
      let kongData = null;
      const API_URL = "http://localhost:8000/api";

      let currentState = {
        status: null,
        players: [],
        roundPlayers: [],
        guests: [],
        countdownRemaining: null,
        dice: null,
        firstPlayer: null,
      };

      function renderPlayers(players) {
        document.getElementById("playersDisplay").textContent = players
          .map((p) => `${p.name} (${p.userId})`)
          .join("\n");
      }

      function renderRoundPlayers(roundPlayers) {
        document.getElementById("roundPlayersDisplay").textContent =
          roundPlayers
            .map((p) => `Seat ${p.seat} → ${p.name} → auto(${p.is_auto})`)
            .join("\n");
      }

      function renderGuests(guests) {
        document.getElementById("guestsDisplay").textContent = guests
          .map((g) => `${g.name}`)
          .join("\n");
      }

      // ================= LOG =================
      function log(message) {
        const logEl = document.getElementById("log");
        logEl.textContent += message + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      }

      // ================= UI HELPERS =================
      function updateStatus(status) {
        document.getElementById("statusDisplay").textContent =
          "Status: " + status;
      }

      function updateCountdown(value) {
        document.getElementById("countdownDisplay").textContent =
          "Countdown: " + value + "s";
      }

      function updateTurn(userId, remaining) {
        const el = document.getElementById("turnDisplay");

        if (!userId) {
          el.textContent = "Turn: -";
          return;
        }

        el.textContent = `Turn: ${userId} | ${remaining}s`;
      }

      function renderState(state) {
        console.log("STATE:", state);

        // keep original merge behavior
        currentState = {
          ...currentState,
          ...state,
        };

        const {
          status,
          players = [],
          roundPlayers = [],
          guests = [],
          countdownRemaining,
          dice,
          firstPlayer,
          handState = [],
          wallCount = null,
          currentTurnUserId,
          turnRemaining,
        } = currentState;

        // ================= BASIC STATE =================
        updateStatus(status);
        updateTurn(currentTurnUserId, turnRemaining);

        if (countdownRemaining !== null) {
          updateCountdown(countdownRemaining);
        } else {
          updateCountdown("-");
        }

        renderPlayers(players);
        renderRoundPlayers(roundPlayers);
        renderGuests(guests);

        // ================= DICE =================
        if (dice) {
          updateDice([dice.d1, dice.d2], dice.total);
        }

        // ================= FIRST PLAYER =================
        if (firstPlayer) {
          updateFirstPlayer(firstPlayer.user_id, firstPlayer.user_name);
        }

        // ================= HAND STATE =================
        if (handState && handState.length) {
          const myPlayer = handState.find((player) => player.isSelf === true);
          const otherPlayers = handState.filter(
            (player) => player.isSelf === false,
          );

          renderMyHandTiles(myPlayer ? myPlayer.tiles : []);
          renderOtherPlayersTiles(otherPlayers);
        } else {
          renderMyHandTiles([]);
          renderOtherPlayersTiles([]);
        }

        // ================= WALL COUNT =================
        if (wallCount !== null) {
          log("🧱 Wall Count: " + wallCount);
          console.log("Wall Count:", wallCount);
        }

        log("📦 State updated");
      }

      function updateDice(dice, total) {
        document.getElementById("diceDisplay").textContent =
          `Dice: ${dice[0]} + ${dice[1]} = ${total}`;
      }

      function updateFirstPlayer(userId, userName) {
        document.getElementById("firstPlayerDisplay").textContent =
          `User: ${userName} (${userId})`;

        highlightFirstPlayer(userId);
      }

      function highlightFirstPlayer(userId) {
        const lines = currentState.roundPlayers.map((p) => {
          const isFirst = p.userId === userId ? " 👈 FIRST" : "";
          return `Seat ${p.seat} → ${p.name} → auto(${p.is_auto})${isFirst}`;
        });

        document.getElementById("roundPlayersDisplay").textContent =
          lines.join("\n");
      }

      function tileLabel(tile) {
        if (!tile || tile.type === "hidden") {
          return "🀫 Hidden";
        }

        if (tile.type === "dot") {
          return `● Dot ${tile.number}`;
        }

        if (tile.type === "bamboo") {
          return `🎋 Bamboo ${tile.number}`;
        }

        return "Unknown";
      }

      function renderMyHandTiles(tiles) {
        const el = document.getElementById("myHandTiles");

        if (!tiles || !tiles.length) {
          el.innerHTML = "-";
          return;
        }

        el.innerHTML = tiles
          .map(
            (tile) => `
              <span style="
                display:inline-block;
                border:1px solid #ccc;
                padding:8px;
                margin:4px;
                border-radius:6px;
                background:#fff;
              ">
                ${tileLabel(tile)}
              </span>
            `,
          )
          .join("");
      }

      function renderOtherPlayersTiles(players) {
        const el = document.getElementById("otherPlayersTiles");

        if (!players || !players.length) {
          el.innerHTML = "-";
          return;
        }

        el.innerHTML = players
          .map(
            (player) => `
              <div style="margin-bottom:16px;">
                <strong>${player.userId || player.name}</strong><br/>
                ${player.tiles
                  .map(
                    (tile) => `
                      <span style="
                        display:inline-block;
                        border:1px solid #ccc;
                        padding:8px;
                        margin:4px;
                        border-radius:6px;
                        background:#f5f5f5;
                      ">
                        ${tileLabel(tile)}
                      </span>
                    `,
                  )
                  .join("")}
              </div>
            `,
          )
          .join("");
      }
      // ================= API =================
      async function getWsToken() {
        const res = await fetch(`${API_URL}/users/web-socket/token/generate`, {
          method: "POST",
          headers: {
            Authorization: "Bearer " + sanctumToken,
            "Content-Type": "application/json",
          },
        });

        const data = await res.json();
        user_id = data.data.user_id;
        return data.data.ws_token;
      }

      async function getJoinToken(roomId) {
        const res = await fetch(
          `${API_URL}/users/mah-jong-game-rooms/${roomId}/join`,
          {
            method: "POST",
            headers: {
              Authorization: "Bearer " + sanctumToken,
              "Content-Type": "application/json",
            },
          },
        );

        const data = await res.json();
        return data.data.token;
      }

      // ================= CONNECT =================
      async function connectSocket() {
        sanctumToken = document.getElementById("sanctumTokenInput").value;

        if (!sanctumToken) {
          log("⚠️ Enter Sanctum token");
          return;
        }

        try {
          wsToken = await getWsToken();

          socket = io("http://localhost:3000", {
            transports: ["websocket"],
            auth: { token: wsToken },
          });

          socket.on("connect", () => {
            log("✅ Connected: " + socket.id);
          });

          socket.on("disconnect", (reason) => {
            log("🔌 Disconnected: " + reason);
          });

          socket.on("connect_error", async (err) => {
            log("❌ Connection Error: " + err.message);

            if (err.message === "invalid_or_expired_ws_token") {
              wsToken = await getWsToken();
              socket.auth.token = wsToken;
              socket.connect();
            }
          });

          socket.on("ws:refresh_required", async () => {
            log("🔄 Refresh required");

            wsToken = await getWsToken();

            socket.emit("ws:refresh", {
              token: wsToken,
            });
          });

          socket.on("ws:refresh_failed", () => {
            log("❌ Refresh failed → reconnect");
            socket.disconnect();
          });

          // ===== DEBUG =====
          socket.onAny((event, ...args) => {
            console.log("📡 EVENT:", event, args);
          });

          // ================= MAHJONG EVENTS =================

          socket.on("mahjong:current_state", (data) => {
            log("✅ Current state shown");
            renderState(data);
          });

          socket.on("mahjong:join_room_success", (data) => {
            log("✅ Joined Room");
            renderState(data);
          });

          socket.on("mahjong:player_joined", (data) => {
            log("👤 New Player Joined");
          });

          socket.on("mahjong:player_left", (data) => {
            log("👋 Player Left: " + data.userId);
          });

          socket.on("mahjong:waiting_for_players", () => {
            log("⏳ Waiting for players");
            updateStatus("waiting");
          });

          // 🔥 UPDATE PLAYERS
          socket.on("mahjong:update_players", (data) => {
            log("🔄 Players updated");

            currentState.players = data;

            renderPlayers(currentState.players);
          });

          // 🔥 UPDATE GUESTS
          socket.on("mahjong:update_guests", (data) => {
            log("🔄 Guests updated");

            currentState.guests = data;

            renderGuests(currentState.guests);
          });

          // 🔥 UPDATE ROUND PLAYERS
          socket.on("mahjong:update_round_players", (data) => {
            log("🔄 Round Players updated");

            currentState.roundPlayers = data;

            renderRoundPlayers(currentState.roundPlayers);
          });

          socket.on("mahjong:round_player_status_updated", (data) => {
            log("🔄 Round Player Status Updated: " + JSON.stringify(data));

            currentState.roundPlayers = data;

            renderRoundPlayers(currentState.roundPlayers);
          });

          socket.on("mahjong:countdown_started", () => {
            log("⏳ Countdown started");
            updateStatus("countdown");
          });

          socket.on("mahjong:countdown", (data) => {
            // log(data.remaining);
            updateCountdown(data.remaining);
          });

          socket.on("testing", (data) => {
            log("TESTINGGGGGGGG");
          });

          socket.on("mahjong:countdown_cancelled", () => {
            log("❌ Countdown cancelled");
            updateCountdown("-");
            updateStatus("waiting");
          });

          socket.on("mahjong:round_started", (data) => {
            log("🎮 Round started");
            updateStatus("playing");
          });

          // start rolling the dice 🎲
          socket.on("mahjong:start_rolling_dice", (data) => {
            log("🎲 Dice Rolling");
          });

          // 🎲 DICE ROLLED
          socket.on("mahjong:dice_rolled", (data) => {
            log("🎲 Dice Rolled: " + JSON.stringify(data));

            const { dice, total } = data;

            updateDice(dice, total);
          });

          // 👑 FIRST PLAYER SELECTED
          socket.on("mahjong:user_to_play", (data) => {
            log(
              "👑 First Player Selected: " +
                data.user_id +
                " (" +
                data.user_name +
                ")",
            );

            updateFirstPlayer(data.user_id, data.user_name);
          });

          socket.on("mahjong:start_shuffling", (data) => {
            log("Shuffling Tiles");
          });

          socket.on("mahjong:dealing_tiles", (data) => {
            log("Dealing Tiles");
          });

          socket.on("mahjong:wall_count_updated", (data) => {
            log("Wall Count Updated: " + data.wallCount);
            console.log("wall count ", data.wallCount);
          });

          socket.on("mahjong:initial_hand_state", (data) => {
            log("🀄 Initial Hand State Received");
            console.log("HAND STATE:: ", data);

            const myPlayer = data.find((player) => player.isSelf === true);
            const otherPlayers = data.filter(
              (player) => player.isSelf === false,
            );

            renderMyHandTiles(myPlayer ? myPlayer.tiles : []);
            renderOtherPlayersTiles(otherPlayers);
          });

          socket.on("mahjong:sorted_hand_state", (data) => {
            log("🀄 Sorted Hand State Received");
            console.log("Sorted Hand", data);

            const myPlayer = data.find((player) => player.isSelf === true);
            const otherPlayers = data.filter(
              (player) => player.isSelf === false,
            );

            renderMyHandTiles(myPlayer ? myPlayer.tiles : []);
            renderOtherPlayersTiles(otherPlayers);
          });

          socket.on("mahjong:turn_countdown_started", (data) => {
            log("⏳ Turn countdown started");

            currentState.currentTurnUserId = data.user_id;
            currentState.turnRemaining = data.duration;

            updateTurn(data.user_id, data.duration);
          });

          socket.on("mahjong:turn_countdown", (data) => {
            currentState.turnRemaining = data.remaining;

            // updateCountdown(data.remaining);
            updateTurn(data.user_id, data.remaining);
          });

          socket.on("mahjong:turn_countdown_finished", (data) => {
            log("⛔ Turn finished: " + data.user_id);

            currentState.turnRemaining = 0;

            updateCountdown("-");
            updateTurn(null, null);
          });

          socket.on("mahjong:can_kong", (data) => {
            log("⛔ Can Kong");
            console.log("Can Kong: ", data);
          });

          socket.on("mahjong:can_interrupt_kong", (data) => {
            log("⛔ Can Interupt Kong");
            console.log("Can Interupt Kong: ", data);
          });

          socket.on("mahjong:can_interrupt_pong", (data) => {
            log("⛔ Can Interupt Pong");
            console.log("Can Interupt Pong: ", data);
          });

          socket.on("mahjong:can_normal_kong", (data) => {
            log("⛔ Can Normal Kong");
            console.log("Can Normal Kong: ", data);
          });

          socket.on("mahjong:can_normal_pong", (data) => {
            log("⛔ Can Normal Pong");
            console.log("Can Normal Pong: ", data);
          });

          socket.on("mahjong:can_normal_chow", (data) => {
            log("⛔ Can Normal Chow");
            console.log("Can Normal Chow: ", data);
          });

          socket.on("mahjong:remove_kong_decision", (data) => {
            log("Remove Kong Decision");
          });

          socket.on("mahjong:remove_pong_decision", (data) => {
            log("Remove Pong Decision");
          });

          socket.on("mahjong:you_win", (data) => {
            log("YOU WIN");
          });

          socket.on("mahjong:draw_round", (data) => {
            log("THIS ROUND IS DRAW. NO WINNER");
          });

          socket.on("mahjong:winner_reveal", (data) => {
            log("Winner Reveal");
            console.log("Winner Reveal: ", data);
          });

          socket.on("mahjong:cannot_discard", (data) => {
            log("Unable to discard");
            console.log("Unable to discard: ", data.message);
          });

          socket.on("mahjong:round_end", (data) => {
            log("ROUND END");
          });

          socket.on("mahjong:error", (err) => {
            log("❌ Error: " + JSON.stringify(err));
          });

          socket.on("pong", (data) => {
            log("📩 Pong: " + JSON.stringify(data));
          });
        } catch (err) {
          log("❌ Setup failed");
        }
      }

      // ================= JOIN =================
      async function joinRoom() {
        if (!socket || !socket.connected) {
          log("⚠️ Not connected");
          return;
        }

        const roomId = document.getElementById("roomIdInput").value;

        if (!roomId) {
          log("⚠️ Enter Room ID");
          return;
        }

        try {
          const joinToken = await getJoinToken(roomId);

          socket.emit("mahjong:join_room", {
            roomId,
            token: joinToken,
          });

          log("➡️ Joining room " + roomId);
        } catch (err) {
          log("❌ Failed to get join token");
        }
      }

      // ================= LEAVE =================
      function leaveRoom() {
        if (!socket || !socket.connected) {
          log("⚠️ Not connected");
          return;
        }

        socket.emit("mahjong:leave_room");
        log("➡️ Leaving room");
      }

      function sortHand() {
        if (!socket || !socket.connected) {
          log("⚠️ Not connected");
          return;
        }

        const roomId = document.getElementById("roomIdInput").value;

        if (!roomId) {
          log("⚠️ Enter Room ID");
          return;
        }

        socket.emit("mahjong:sort_hand", {
          roomId,
          userId: user_id,
        });

        log("➡️ Sort Hand Requested");
      }

      function acceptKong() {
        const kongKey = document.getElementById("kongKeyInput").value;
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:accept_kong", {
          roomId,
          userId: user_id,
          kongKey,
        });
      }

      function passKong() {
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:pass_kong", {
          roomId,
          userId: user_id,
        });
      }

      function acceptInterruptKong() {
        const kongKey = document.getElementById("kongKeyInput").value;
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:accept_interrupt_kong", {
          roomId,
          userId: user_id,
          kongKey,
        });
      }

      function acceptInterruptPong() {
        const pongKey = document.getElementById("pongKeyInput").value;
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:accept_interrupt_pong", {
          roomId,
          userId: user_id,
          pongKey,
        });
      }

      function acceptNormalKong() {
        const kongKey = document.getElementById("kongKeyInput").value;
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:accept_normal_kong", {
          roomId,
          userId: user_id,
          kongKey,
        });
      }

      function passNormalKong() {
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:pass_normal_kong", {
          roomId,
          userId: user_id,
        });
      }

      function acceptNormalPong() {
        const pongKey = document.getElementById("pongKeyInput").value;
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:accept_normal_pong", {
          roomId,
          userId: user_id,
          pongKey,
        });
      }

      function passNormalPong() {
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:pass_normal_pong", {
          roomId,
          userId: user_id,
        });
      }

      function acceptNormalChow() {
        const chowKey = document.getElementById("chowKeyInput").value;
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:accept_normal_chow", {
          roomId,
          userId: user_id,
          chowKey,
        });
      }

      function passNormalChow() {
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:pass_normal_chow", {
          roomId,
          userId: user_id,
        });
      }

      function discardTile() {
        const tileId = document.getElementById("discardTileIdInput").value;
        const roomId = document.getElementById("roomIdInput").value;
        socket.emit("mahjong:discard_tile", {
          roomId,
          userId: user_id,
          tileId,
        });
      }

      // ================= PING =================
      function sendPing() {
        if (!socket || !socket.connected) {
          log("⚠️ Not connected");
          return;
        }

        socket.emit("ping", { test: true });
        log("➡️ Sent ping");
      }
    </script>
  </body>
</html>
